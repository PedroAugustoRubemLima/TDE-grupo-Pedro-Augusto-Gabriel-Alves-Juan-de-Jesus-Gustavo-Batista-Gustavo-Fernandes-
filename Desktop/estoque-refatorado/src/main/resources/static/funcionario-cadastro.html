<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funcionarios — JB Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1 class="page-title" style="margin-bottom:1.5rem">Funcionarios</h1>

  <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:1.5rem;align-items:start">

    <div class="card">
      <div class="card-title">Novo Funcionario</div>
      <div class="form-row">
        <div class="form-group">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
      </div>
      <div class="form-group">
        <label for="cargo">Cargo *</label>
        <input type="text" id="cargo" placeholder="Ex: VENDEDOR, GERENTE, ADMIN">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="usuario">Usuario *</label>
          <input type="text" id="usuario" placeholder="login do sistema" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="senha">Senha *</label>
          <input type="password" id="senha" placeholder="senha" autocomplete="new-password">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSalvar">Salvar Funcionario</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div class="card">
      <div class="card-title">Funcionarios Cadastrados</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Nome</th><th>Cargo</th><th>Usuario</th><th></th></tr>
          </thead>
          <tbody id="tabelaFuncionarios"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="funcionario-cadastro.js"></script>
</body>
</html>

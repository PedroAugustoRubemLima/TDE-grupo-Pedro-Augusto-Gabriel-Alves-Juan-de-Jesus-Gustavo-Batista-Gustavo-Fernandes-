<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JB Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-box">
  <div class="login-header">
    <span class="logo-mark">JB</span>
    <h1>JB Laticínios</h1>
  </div>
  <p class="login-subtitle">Sistema de Estoque e Vendas</p>

  <form id="loginForm" autocomplete="off">
    <div class="form-group">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" name="no_autofill_user" placeholder="Digite seu usuário"
             autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="no_autofill_pass" placeholder="Digite sua senha"
             autocomplete="new-password">
    </div>

    <button type="button" class="btn btn-primary" style="width:100%;margin-top:0.75rem" id="btnLogin">
      Entrar
    </button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script src="auth.js"></script>
<script src="login.js"></script>
</body>
</html>

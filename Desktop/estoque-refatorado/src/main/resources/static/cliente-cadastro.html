<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — JB Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1 class="page-title" style="margin-bottom:1.5rem">Clientes</h1>

  <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:1.5rem;align-items:start">

    <div class="card">
      <div class="card-title">Novo Cliente</div>
      <div class="form-group">
        <label for="nome">Nome *</label>
        <input type="text" id="nome" placeholder="Nome completo">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000">
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@exemplo.com">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSalvar">Salvar Cliente</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div class="card">
      <div class="card-title">Clientes Cadastrados</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Nome</th><th>Telefone</th><th></th></tr>
          </thead>
          <tbody id="tabelaClientes"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="cliente-cadastro.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Venda — JB Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="page-header">
    <h1 class="page-title">Nova Venda</h1>
    <a href="/historico-vendas.html" class="btn btn-ghost">Ver Historico</a>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:1.5rem;align-items:start">

    <div>
      <div class="card">
        <div class="card-title">Dados da Venda</div>
        <div class="form-group">
          <label for="selCliente">Cliente (opcional)</label>
          <select id="selCliente">
            <option value="">— Sem cliente —</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Adicionar Produto</div>
        <div class="form-group">
          <label for="selProduto">Produto *</label>
          <select id="selProduto">
            <option value="">Selecione um produto</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="quantidade">Quantidade *</label>
            <input type="number" id="quantidade" min="0.01" step="0.01" placeholder="0">
          </div>
          <div class="form-group">
            <label for="precoUnit">Preco Unitario (R$) *</label>
            <input type="number" id="precoUnit" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btnAdicionarItem">+ Adicionar Item</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Itens da Venda</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Preco Unit.</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabelaItens"></tbody>
        </table>
      </div>

      <hr class="divider">

      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:0.85rem;color:var(--text-dim);font-weight:500">Total da Venda</span>
        <span id="totalVenda" style="font-size:1.5rem;font-weight:700;color:var(--success)">R$ 0.00</span>
      </div>

      <div class="form-actions" style="margin-top:1.25rem">
        <button class="btn btn-success" id="btnFinalizar" style="width:100%;padding:0.7rem">Finalizar Venda</button>
      </div>

      <div class="msg" id="msg"></div>
    </div>

  </div>
</main>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="nova-venda.js"></script>
</body>
</html>

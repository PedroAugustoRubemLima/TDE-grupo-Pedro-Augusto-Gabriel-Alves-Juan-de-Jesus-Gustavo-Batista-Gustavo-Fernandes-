# ================================================
# Sistema de Estoque - Laticínios
# application.properties (desenvolvimento)
# ================================================

# Banco de Dados
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:estoque_jb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Servidor
server.port=8080

# Arquivos estáticos
spring.web.resources.static-locations=classpath:/static/

# ------------------------------------------------
# JWT
# ------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ------------------------------------------------
# Bootstrap de usuario admin (ambiente dev)
# ------------------------------------------------
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.usuario=${APP_BOOTSTRAP_ADMIN_USUARIO:admin}
app.bootstrap.admin.senha=${APP_BOOTSTRAP_ADMIN_SENHA}
app.bootstrap.admin.nome=${APP_BOOTSTRAP_ADMIN_NOME:Administrador}
app.bootstrap.admin.cargo=${APP_BOOTSTRAP_ADMIN_CARGO:ADMIN}

# ------------------------------------------------
# Criptografia AES (chave de 16 caracteres exatos)
# ------------------------------------------------
app.crypto.secret=${AES_SECRET}

# ------------------------------------------------
# CORS
# ------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:5500,http://localhost:5500}

# ------------------------------------------------
# Logs
# ------------------------------------------------
logging.level.com.seuprojeto.lojadesktop=DEBUG
logging.level.org.springframework.security=DEBUG

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

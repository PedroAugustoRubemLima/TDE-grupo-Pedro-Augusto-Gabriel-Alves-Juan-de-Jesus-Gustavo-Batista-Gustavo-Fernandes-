<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque — JB Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1 class="page-title" style="margin-bottom:1.5rem">Movimentacao de Estoque</h1>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">

    <div class="card">
      <div class="card-title">Retirada</div>
      <div class="form-group">
        <label for="produtoRetirar">Produto *</label>
        <select id="produtoRetirar">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="qtdRetirar">Quantidade *</label>
        <input type="number" id="qtdRetirar" placeholder="0" step="0.01" min="0.01">
      </div>
      <div class="form-actions">
        <button class="btn btn-danger" id="btnRetirar">Retirar</button>
      </div>
      <div class="msg" id="msgRetirar"></div>
    </div>

    <div class="card">
      <div class="card-title">Entrada</div>
      <div class="form-group">
        <label for="produtoAdicionar">Produto *</label>
        <select id="produtoAdicionar">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="qtdAdicionar">Quantidade *</label>
        <input type="number" id="qtdAdicionar" placeholder="0" step="0.01" min="0.01">
      </div>
      <div class="form-actions">
        <button class="btn btn-success" id="btnAdicionar">Adicionar</button>
      </div>
      <div class="msg" id="msgAdicionar"></div>
    </div>

  </div>

  <div class="card">
    <div class="card-title">Estoque Atual</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Produto</th><th>Tipo</th><th>Quantidade Atual</th></tr>
        </thead>
        <tbody id="tabelaEstoque"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="retira-estoque.js"></script>
</body>
</html>

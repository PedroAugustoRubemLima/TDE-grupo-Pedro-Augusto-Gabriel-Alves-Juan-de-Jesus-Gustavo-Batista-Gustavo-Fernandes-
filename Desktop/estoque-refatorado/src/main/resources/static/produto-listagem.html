<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — JB Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="page-header">
    <h1 class="page-title">Produtos</h1>
    <a href="/produto-cadastro.html" class="btn btn-primary">Novo Produto</a>
  </div>

  <div class="card">
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por nome...">
      <button class="btn btn-ghost" onclick="carregarProdutos()">Buscar</button>
      <button class="btn btn-ghost" onclick="document.getElementById('busca').value='';carregarProdutos()">Limpar</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Preco</th>
            <th>Qtd</th>
            <th>Vencimento</th>
            <th>Status</th>
            <th>Acoes</th>
          </tr>
        </thead>
        <tbody id="tabelaProdutos"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="produto-listagem.js"></script>
</body>
</html>
